<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>color legend</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/colorLegend.css">
    <style>
        @font-face {
            font-family: 'GMarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
            font-weight: 500;
            font-display: swap;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-y: auto;
            /* 스크롤 허용 */
            background-color: #f0f2f5;
        }

        /* 메인 콘텐츠 영역 */
        .main-content {
            padding: 2rem;
            min-height: 100vh;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        /* 데이터를 표시할 스타일 추가 */
        .feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-content: flex-start;
            max-width: 400px;
            margin-left: 1rem;
            margin-top: 0.5rem;
        }

        .feature-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-family: 'GMarketSans';
            font-weight: 500;
            font-size: small;
            cursor: pointer;
        }

        .legend {
            display: flex;
            flex-direction: column;
            position: fixed;
            right: 0px;
            bottom: 0px;
            z-index: 1000;
            background-color: white;
            border-radius: 4px;
            padding: 4px;
        }
    </style>
</head>

<body>
    <div class="main-content">
        <h1>데이터 대시보드</h1>
        <p>스크롤하여 페이지를 확인해보세요. 범례는 우측 하단에 고정되어 있습니다.</p>

        <div class="d-flex g-2">
            <!-- 데이터가 뿌려질 컨테이너 -->
            <div id="airContainer" class="feature-list"></div>
        </div>

        <div class="d-flex g-2">
            <div id="starContainer" class="feature-list"></div>
        </div>

        <div class="d-flex flex-column g-2">
            <div id="skyContainer" class="feature-list"></div>
        </div>

    </div>

    <div class="legend">
        <div style="font-family: GmarketSans; font-size: small;" class="d-flex justify-content-center">범례</div>

        <div class="d-flex">

            <div id="legend_air" class="cl-container vertical" data-labels="0, 50, 100" data-width="10"
                data-height="120" data-colors="#fdf1f5, #ee8e46, #c46b23" data-mark="true"></div>
            <div id="legend_air_3" class="ms-2 cl-container vertical" data-width="10" data-height="120"
                data-colors="black, red"></div>

        </div>
        <div id="legend_air_2" class="cl-container horizontal" data-width="120" data-height="10"></div>
        <div id="legend_star" class="cl-container horizontal" data-mark="true" data-width="120" data-height="10"
            data-markersize="15">
        </div>
        <div id="legend_sky" class="cl-container horizontal " data-mark="true" data-width="120" data-height="10"
            data-colors="#2F2FE4, #1A1953">
        </div>

    </div>


    <script src="/script/colorLegend.js" defer></script>
    <script type="module">

        import ColorLegend from '/script/colorLegend.js';

        // 데이터 생성 (0~100 사이의 랜덤 숫자 30개)
        let air = [];
        for (let i = 0; i < 30; i++) {
            air.push(Math.round(Math.random() * 100));
        }

        let star = [];
        for (let i = 0; i < 30; i++) {
            star.push(Math.round(Math.random() * 100));
        }

        let sky = [];
        for (let i = 0; i < 30; i++) {
            sky.push(Math.round(Math.random() * 100));
        }

        // 데이터 표출하기
        window.addEventListener('load', () => {

            // 데이터 표출하기 
            // air 
            const legend_air = ColorLegend.getById('legend_air');
            const container_air = document.getElementById('airContainer')
            if(legend_air) legend_air.render(air, container_air)

            // star
            const legend_star = ColorLegend.getById('legend_star');
            const container_star = document.getElementById('starContainer')
            if(legend_star) legend_star.render(star, container_star)

            // sky
            const legend_sky = ColorLegend.getById('legend_sky');
            const container_sky = document.getElementById('skyContainer')
            if(legend_sky) legend_sky.render(sky, container_sky)

        })
    </script>
</body>

</html>
