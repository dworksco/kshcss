<html>

<head>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 데이터를 표시할 스타일 추가 */
        #feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-content: flex-start;
            max-width: 400px;
        }

        .feature-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .linearGradient {
            display: flex;
            align-items: flex-start;
        }

        .canvasGrad {
            order: 2; /* 그라데이션을 두 번째(오른쪽)로 배치 */
        }

        .canvasMark {
            order: 1; /* 마커를 첫 번째(왼쪽)로 배치 */
        }
    </style>
</head>

<body>
    <div class="d-flex g-2" style="height: 110px;">
        
        <!-- 데이터가 뿌려질 컨테이너 -->
        <div id="feature-list" class="ms-4"></div>
        
        <div id="legend_air"
             class="linearGradient"
                    data-width="10"
                    data-height="120"
                    data-colors="#f92a82, #ed7b84, #d6d5b3, #7eb77f"
                    data-mark="true">
        </div>

        <div class="d-flex flex-column justify-content-between" style="padding: 5px 0;">
            <div>0</div>
            <div>100</div>
        </div> 

    </div>


    <script src="/script/colorLegend.js"></script>
    <script type="module">

        // 데이터 생성 (0~100 사이의 랜덤 숫자 30개)
        let features = [];
        for (let i = 0; i < 30; i++) {
            features.push(Math.round(Math.random() * 100));
        }
        
        window.addEventListener('load', () => {
            
            const ctxGrad = document.querySelector('.canvasGrad').getContext('2d')
            // 데이터 표출하기
            if(ctxGrad) { showFeatures(features, ctxGrad) }

        })


    </script>
</body>

</html>
