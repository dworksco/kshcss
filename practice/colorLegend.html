<html>

<head>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 데이터를 표시할 스타일 추가 */
        #feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-content: flex-start;
            max-width: 400px;
        }

        .feature-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .linearGradient {
            display: flex;
            align-items: flex-start;
        }

        .canvasGrad {
            order: 2; /* 그라데이션을 두 번째(오른쪽)로 배치 */
        }

        .canvasMark {
            order: 1; /* 마커를 첫 번째(왼쪽)로 배치 */
        }
    </style>
</head>

<body>
    <div class="d-flex g-2" style="height: 110px;">
        <div class="linearGradient">

        </div>

        <div class="d-flex flex-column justify-content-between" style="padding: 5px 0;">
            <div>0</div>
            <div>100</div>
        </div>

        <!-- 데이터가 뿌려질 컨테이너 -->
        <div id="feature-list" class="ms-4"></div>

    </div>


    <script src="/script/colorLegend.js"></script>
    <script type="module">
        let colors = ['red', 'yellow', 'green', 'blue']

        // 이제 실행 순서가 바뀌어도 CSS의 'order' 속성 덕분에 
        // 마커는 항상 왼쪽, 그라데이션은 항상 오른쪽에 위치합니다.
        const ctxGrad = createGradientColor(colors)
        showMark()

        // 데이터 생성 (0~100 사이의 랜덤 숫자 30개)
        let features = [];
        for (let i = 0; i < 30; i++) {
            features.push(Math.round(Math.random() * 100));
        }

        // 데이터 표출하기
        showFeatures(features, ctxGrad)
    </script>
</body>

</html>
