<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>color legend</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/colorLegend.css">
    <style>
        @font-face {
            font-family: 'GMarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
            font-weight: 500;
            font-display: swap;
        }

        /* 전체 */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-y: auto; /* 스크롤 허용 */
            background-color: #f0f2f5;
        }

        /* 메인 콘텐츠 영역 */
        .main-content {
            padding: 2rem;
            min-height: 100vh;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            background-color: #f8f9fa;
        }

        .card h3 { margin: 0 0 10px 0; color: #333; }
        .card p { color: #666; font-size: 0.9rem; line-height: 1.5; }

        /* 데이터를 표시할 스타일 추가 */
        .feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-content: flex-start;
            max-width: 400px;
            margin-left: 1rem;
            margin-top: 0.5rem;
        }

        .feature-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-family: 'GMarketSans';
            font-weight: 500;
            font-size: small;
            cursor: pointer;
        }

        .legend {
            display: flex;
            position: fixed;
            right: 16px;
            bottom: 0px;
            z-index: 1000;
            background-color: white;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="main-content">
        <h1>데이터 대시보드</h1>
        <p>스크롤하여 페이지를 확인해보세요. 범례는 우측 하단에 고정되어 있습니다.</p>

        <div class="d-flex g-2">
            <!-- 데이터가 뿌려질 컨테이너 -->
            <div id="airContainer" class="feature-list"></div>
        </div>

        <div class="d-flex g-2">
            <div id="starContainer" class="feature-list"></div>
        </div>

        <div class="d-flex flex-column g-2">
            <div id="skyContainer" class="feature-list"></div>
        </div>

    </div>

    <div class="legend">
        <div id="legend_air" class="legendContainer vertical" data-labels="0, 50, 100" data-width="10" data-height="120"
            data-colors="#fdf1f5, #ee8e46, #c46b23" data-mark="true"></div>
            <div id="legend_air_3" class="ms-2 legendContainer vertical" data-width="10" data-height="120"
            data-colors="black, red"></div>
            <div class="d-flex flex-column justify-content-end">
                <div id="legend_air_2" class=" legendContainer horizontal" data-width="120" data-height="10"></div>
            <div id="legend_star" class="legendContainer horizontal" data-mark="true" data-width="120" data-height="10"
                data-markersize="15"></div>
            <div id="legend_sky" class="legendContainer horizontal " data-mark="true" data-width="120" data-height="10"
                data-colors="#2F2FE4, #1A1953"></div>
            </div>
    </div>


    <script src="/script/colorLegend.js"></script>
    <script type="module">

        // 데이터 생성 (0~100 사이의 랜덤 숫자 30개)
        let air = [];
        for (let i = 0; i < 30; i++) {
            air.push(Math.round(Math.random() * 100));
        }

        let star = [];
        for (let i = 0; i < 30; i++) {
            star.push(Math.round(Math.random() * 100));
        }

        let sky = [];
        for (let i = 0; i < 30; i++) {
            sky.push(Math.round(Math.random() * 100));
        }


        window.addEventListener('load', () => {

            // 데이터 표출하기 
            const legend_air = document.getElementById('legend_air')
            const container_air = document.getElementById('airContainer')
            showFeatures(air, legend_air, container_air)

            // 데이터 표출하기
            const legend_star = document.getElementById('legend_star')
            const container_star = document.getElementById('starContainer')
            showFeatures(star, legend_star, container_star)

            // 데이터 표출하기
            const legend_sky = document.getElementById('legend_sky')
            const container_sky = document.getElementById('skyContainer')
            showFeatures(sky, legend_sky, container_sky)
        })

    </script>
</body>

</html>
