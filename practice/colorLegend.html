<html>

<head>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/colorLegend.css">
    <style>
        /* 전체 */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* 데이터를 표시할 스타일 추가 */
        .feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-content: flex-start;
            max-width: 400px;
            margin-left: 1rem;
            margin-top: 0.5rem;
        }

        .feature-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        
    </style>
</head>

<body>
    <div class="d-flex g-2">

        <!-- 데이터가 뿌려질 컨테이너 -->
        <div class="feature-list"></div>

        <div id="legend_air" class="legendContainer" data-min="0" data-max="100" data-width="10" data-height="120"
            data-colors="#f92a82, #ed7b84, #d6d5b3, #7eb77f" data-mark="true">
        </div>

    </div>

    <div class="d-flex g-2">
        <div class="feature-list"></div>
        <div id="legend_star" class="legendContainer" data-mark="true"></div>
    </div>


    <script src="/script/colorLegend.js"></script>
    <script type="module">

        // 데이터 생성 (0~100 사이의 랜덤 숫자 30개)
        let air = [];
        for (let i = 0; i < 30; i++) {
            air.push(Math.round(Math.random() * 100));
        }

        let star = [];
        for (let i = 0; i < 30; i++) {
            star.push(Math.round(Math.random() * 100));
        }


        window.addEventListener('load', () => {

            const legend_air = document.getElementById('legend_air')

            // 데이터 표출하기
            if (legend_air) { showFeatures(air, legend_air) }

            const legend_star = document.getElementById('legend_star')

            // 데이터 표출하기
            if (legend_star) { showFeatures(star, legend_star) }


        })


    </script>
</body>

</html>
