<html>

<head>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/colorLegend.css">
    <style>
        @font-face {
            font-family: 'GMarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
            font-weight: 500;
            font-display: swap;
        }

        /* 전체 */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* 데이터를 표시할 스타일 추가 */
        .feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-content: flex-start;
            max-width: 400px;
            margin-left: 1rem;
            margin-top: 0.5rem;
        }

        .feature-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-family: 'GMarketSans';
            font-weight: 500;
            font-size: small;
        }

    </style>
</head>

<body>
    <div class="d-flex g-2">

        <!-- 데이터가 뿌려질 컨테이너 -->
        <div id="airContainer" class="feature-list"></div>

        <div id="legend_air" class="legendContainer vertical" data-labels="0, 50, 100" data-width="10" data-height="120"
            data-colors="#fdf1f5, #ee8e46, #c46b23" data-mark="true">
        </div>

    </div>

    <div class="d-flex g-2">
        <div id="starContainer" class="feature-list"></div>
        <div id="legend_star" class="legendContainer horizontal" data-mark="true" 
            data-width="120" data-height="10" data-markersize="15"></div>
    </div>

    <div class="d-flex flex-column g-2">
        <div id="skyContainer" class="feature-list"></div>
        <div id="legend_sky" class="legendContainer horizontal ms-2" data-mark="true" 
            data-width="120" data-height="10"  data-colors="#2F2FE4, #1A1953"></div>
    </div>



    <script src="/script/colorLegend.js"></script>
    <script type="module">

        // 데이터 생성 (0~100 사이의 랜덤 숫자 30개)
        let air = [];
        for (let i = 0; i < 30; i++) {
            air.push(Math.round(Math.random() * 100));
        }

        let star = [];
        for (let i = 0; i < 30; i++) {
            star.push(Math.round(Math.random() * 100));
        }

        let sky = [];
        for (let i = 0; i < 30; i++) {
            sky.push(Math.round(Math.random() * 100));
        }


        window.addEventListener('load', () => {

            // 데이터 표출하기 
            const legend_air = document.getElementById('legend_air')
            const container_air = document.getElementById('airContainer')
            showFeatures(air, legend_air, container_air)

            // 데이터 표출하기
            const legend_star = document.getElementById('legend_star')
            const container_star = document.getElementById('starContainer')
            showFeatures(star, legend_star, container_star)

            // 데이터 표출하기
            const legend_sky = document.getElementById('legend_sky')
            const container_sky = document.getElementById('skyContainer')
            showFeatures(sky, legend_sky, container_sky)



        })


    </script>
</body>

</html>
