        @import url(./libs/Cesium-1.138/Build/CesiumUnminified/Widgets/widgets.css);

        html,
        body,
        #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 헤더 */
        .header {
            width: 100dvw;
            /* height: 8dvh; */
            background-color: #f8f9fa;
            border: solid 2px #dee2e6;
        }

        .header-left {
            justify-content: left;
            align-items: center;
            padding-top: 1rem;
            padding-bottom: 1rem;
            padding-inline-start: 1rem;
            padding-inline-end: 0.5rem;
            gap: 1rem;
        }

        .header-center {
            flex-grow: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }

        .header-right {
            justify-content: right;
            align-items: center;
            padding-top: 1rem;
            padding-bottom: 1rem;
            padding-inline-start: 0.5rem;
            padding-inline-end: 1rem;
            gap: 1rem;
        }

        .main {
            width: 100dvw;
            height: 92dvh;
            display: flex;
        }

        /* 사이드바 */
        .sidebar {
            width: 40dvw;
            height: 100dvh;
            padding: 1rem;
            display: flex;
            flex-direction: column;
        }

        /* Text Search */
        .search-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 3px;
        }

        /* 즐겨찾기 */
        .star .star-fill {
            fill: #ffc107;
            opacity: 0;
        }

        .star.active .star-fill {
            opacity: 1;
        }

        .star.acitve .star-stroke {
            fill: #ffc107;
        }


        /* 타임라인 */
        .timeline {
            list-style: none;
            padding: 0;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 5px;
            bottom: 5px;
            width: 1px;
            background-color: #dee2e6;
        }

        .timeline-item {
            position: relative;
            padding-left: 25px;
            margin-bottom: 20px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: #dee2e6;
            z-index: 1;
        }

        /* drop down */
        .drop-down-container {
            position: relative;
            display: inline-flex;
        }

        .drop-down {
            position: absolute;
            top: 100%;
            list-style: none;
            border: solid 2px #dee2e6;
            border-radius: 0.5rem;
            background-color: #ffff;
            box-shadow: 0px 4px 12px 4px #dee2e6;
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            padding-left: 0.25rem;
            padding-right: 0.25rem;
            margin-top: 0.25rem;
            display: none;
            flex-direction: column;
            z-index: 100;
        }

        .drop-down.show {
            opacity: 1;
            display: inline-flex;
        }

        .drop-down-list {
            display: inline-flex;
            gap: 8px;
            padding: 0.5rem;
            border-radius: 0.5rem;

        }

        .drop-down-list-check {
            opacity: 0;
        }

        .drop-down-list-check:active {
            opacity: 1;
        }

        .drop-down-list:hover {
            background-color: #dee2e6;
        }

        /* 지도 */
        .map {
            width: 60dvw;
            height: 100dvh;
            background-color: black;
        }
    </style>

            const queryString = window.location.search;
            const urlParams = new URLSearchParams(queryString);
            const mytkn = urlParams.get('mytkn');

            // Cesium.Ion.defaultAccessToken = urlParams;
            Cesium.Ion.defaultAccessToken = mytkn;
            const viewer = new Cesium.Viewer("cesiumContainer", {
                timeline: false,
                animation: false,
                // baseLayerPicker: false,
                // geocoder: false,
                // homeButton: false,
                // sceneModePicker: false,
                // navigationHelpButton: false,
                // fullscreenButton: false,
                infoBox: true,
                selectionIndicator: false,
                skyBox: false,
                // skyAtmosphere: false,
                // globe: false,
                scene3DOnly: true,
                terrain: Cesium.Terrain.fromWorldTerrain(),
            });

            // // Fly the camera to San Francisco at the given longitude, latitude, and height.
            // viewer.camera.flyTo({
            //     destination: Cesium.Cartesian3.fromDegrees(126.922056, 37.389132, 1200),
            //     orientation: {
            //         heading: Cesium.Math.toRadians(-30.0),
            //         pitch: Cesium.Math.toRadians(-80.0),
            //     }
            // });

            // // Add Cesium OSM Buildings, a global 3D buildings layer.
            // const buildingTileset = await Cesium.createOsmBuildingsAsync();

            // viewer.scene.primitives.add(buildingTileset);

            // style 적용
            // buildingTileset.style = new Cesium.Cesium3DTileStyle({
            //   color: {
            //     conditions: [
            //      ["${building} === 'university'", "color('black')"],
            //      ["true", "color('white')"]
            //     ]
            //   }
            // })

            const searchInput = document.getElementById('searchInput');
            const items = document.querySelectorAll('.search-item');

            // Text Search Function
            searchInput.addEventListener('input', (e) => {
                const filter = e.target.value.toLowerCase(); // 입력값을 소문자로 변환

                items.forEach(item => {
                    const text = item.textContent.toLowerCase();

                    // 3. 텍스트 포함 여부 확인
                    if (text.includes(filter)) {
                        item.style.display = ""; // 보임
                    } else {
                        item.style.display = "none"; // 숨김
                    }
                });
            });

            const stars = document.querySelectorAll('.star')
            // star button clicked
            stars.forEach(star => {
                star.addEventListener('click', (e) => {
                    const nowStar = e.currentTarget;
                    star.classList.toggle('active');

                    const starText = nowStar.querySelector('.star-text')
                    starText.textContent = nowStar.classList.contains('active') ? 'starred' : 'star';
                })
            })

            const askDropDown = document.querySelector('#ask-drop-down')
            const dropDownList = document.querySelectorAll('.drop-down-list')
            //drop down button clicked
            askDropDown.addEventListener('click', e => {
                const ul = e.currentTarget.nextElementSibling;
                ul.classList.toggle('show')

            })

            const askSVGList = dropDownList[0].querySelectorAll('svg');
            const agentSVGList = dropDownList[1].querySelectorAll('svg');
            // list of drop down button's icon path
            const dropDownButtonIconPaths = askDropDown.querySelectorAll('svg')[0].querySelectorAll('path')

            // Ask clicked
            dropDownList[0].addEventListener('click', e => {
                askSVGList[0].style.opacity = "1";
                agentSVGList[0].style.opacity = "0";

                // change drop down button icon -> ask
                dropDownButtonIconPaths[0].style.opacity = "1";
                dropDownButtonIconPaths[1].style.opacity = "0";
                askDropDown.querySelector('div').textContent = 'Ask'
            })

            // Agent clicked
            dropDownList[1].addEventListener('click', e => {
                askSVGList[0].style.opacity = "0";
                agentSVGList[0].style.opacity = "1";

                // change drop down button icon -> agent
                dropDownButtonIconPaths[0].style.opacity = "0";
                dropDownButtonIconPaths[1].style.opacity = "1";
                askDropDown.querySelector('div').textContent = 'Agent'
            })



        </script>
        <script src="./json_reader.js"></script>
    </div>

</body>

</html>
