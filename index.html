            padding: 0;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 헤더 */
        .header {
            width: 100dvw;
            height: 8dvh;
            background-color: #f8f9fa;
            border: solid 2px #dee2e6;
        }

        .header-left {
            justify-content: left;
            align-items: center;
            padding-top: 1rem;
            padding-bottom: 1rem;
            padding-inline-start: 1rem;
            padding-inline-end: 0.5rem;
            gap: 1rem;
        }

        .header-center {
            flex-grow: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }

        .header-right {
            justify-content: right;
            align-items: center;
            padding-top: 1rem;
            padding-bottom: 1rem;
            padding-inline-start: 0.5rem;
            padding-inline-end: 1rem;
            gap: 1rem;
        }

        .main {
            width: 100dvw;
            height: 92dvh;
            display: flex;
        }

        /* 사이드바 */
        .sidebar {
            width: 40dvw;
            height: 100%;
            padding: 1rem;
            display: flex;
            flex-direction: column;
        }

        /* content */
        .content {
            width: 60dvw;
            height: 100%;
        }

        /* 지도 */
        #cesiumContainer {
            width: 100%;
            height: 100%;
        }
    </style>

                                        <div>Christina Giannouli</div>
                                    </th>
                                    <th>Sensor</th>
                                    <th>CEO</th>
                                </tr>
                            </tbody>
                        </table>

                    </div>
                </div>

                <div class="overlay widget-toggle-btn hidden">
                    <button class="btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                            <path fill="currentColor"
                                d="M5.616 20q-.691 0-1.153-.462T4 18.384V5.616q0-.691.463-1.153T5.616 4h12.769q.69 0 1.153.463T20 5.616v12.769q0 .69-.462 1.153T18.384 20zm5.884-5.596H5v3.98q0 .27.173.443t.443.173H11.5zm1 0V19h5.885q.269 0 .442-.173t.173-.442v-3.981zm-1-1V8.769H5v4.635zm1 0H19V8.769h-6.5zM5 7.769h14V5.615q0-.269-.173-.442T18.385 5H5.615q-.269 0-.442.173T5 5.616z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <script type="module">

            const map = document.querySelector('#cesiumContainer');
            const widget = document.querySelectorAll('.overlay');
            const widgetHeader = document.querySelector('.widget-header')
            
            // widget 초기 위치 설정
            function setInitialWidgetPosition() {
                const rect = map.getBoundingClientRect();

                widget.forEach(widget => {
                    widget.style.top = `${rect.top + 32}px`;
                    widget.style.left = `${rect.left + 16}px`;
                })
            }

            // 창 변경사항에 따라 초기위치 설정
            window.addEventListener('load', setInitialWidgetPosition);
            window.addEventListener('resize', setInitialWidgetPosition);


            const queryString = window.location.search;
            const urlParams = new URLSearchParams(queryString);
            const mytkn = urlParams.get('mytkn');

            Cesium.Ion.defaultAccessToken = mytkn;
            // Cesium.Ion.defaultAccessToken = urlParams;
            const viewer = new Cesium.Viewer("cesiumContainer", {
                timeline: false,
                animation: false,
                // baseLayerPicker: false,
                // geocoder: false,
                // homeButton: false,
                // sceneModePicker: false,
                // navigationHelpButton: false,
                // fullscreenButton: false,
                infoBox: true,
                selectionIndicator: false,
                skyBox: false,
                // skyAtmosphere: false,
                // globe: false,
                scene3DOnly: true,
                terrain: Cesium.Terrain.fromWorldTerrain(),
            });

            // Fly the camera to San Francisco at the given longitude, latitude, and height.
            // viewer.camera.flyTo({
                //   destination: Cesium.Cartesian3.fromDegrees(126.922056, 37.389132, 1200),
            //   orientation: {
            //     heading: Cesium.Math.toRadians(-30.0),
            //     pitch: Cesium.Math.toRadians(-80.0),
            //   }
            // });

            // Add Cesium OSM Buildings, a global 3D buildings layer.
            const buildingTileset = await Cesium.createOsmBuildingsAsync();

            viewer.scene.primitives.add(buildingTileset);

            // style 적용
            // buildingTileset.style = new Cesium.Cesium3DTileStyle({
            //   color: {
            //     conditions: [
            //      ["${building} === 'university'", "color('black')"],
            //      ["true", "color('white')"]
            //     ]
            //   }
            // })

            const searchInput = document.getElementById('searchInput');
            const items = document.querySelectorAll('.search-item');
            // Text Search Function
            searchInput.addEventListener('input', (e) => {
                const filter = e.target.value.toLowerCase(); // 입력값을 소문자로 변환

                items.forEach(item => {
                    const text = item.textContent.toLowerCase();

                    // 3. 텍스트 포함 여부 확인
                    if (text.includes(filter)) {
                        item.style.display = ""; // 보임
                    } else {
                        item.style.display = "none"; // 숨김
                    }
                });
            });

            const stars = document.querySelectorAll('.star')
            // click 즐겨찾기 button 
            stars.forEach(star => {
                star.addEventListener('click', (e) => {
                    const nowStar = e.currentTarget;
                    star.classList.toggle('active');

                    const starText = nowStar.querySelector('.star-text')
                    starText.textContent = nowStar.classList.contains('active') ? 'starred' : 'star';
                })
            })

            const modeDropDownButton = document.querySelector('#modeDropDownButton')
            const modeDropDownContainer = document.querySelector('#modeDropDownContainer')
            const modeDropDownMenu = modeDropDownContainer.querySelector('.drop-down-menu')

            // ask/agent mode drop down button clicked
            modeDropDownButton.addEventListener('click', e => {
                modeDropDownMenu.classList.toggle('show')
            })

            // list of drop down button's icon path
            const modeDropDownButtonIconPaths = modeDropDownButton.querySelectorAll('svg')[0].querySelectorAll('path')

            // click drop down list
            modeDropDownMenu.addEventListener('click', e => {
                const item = e.target.closest('.drop-down-list')
                if (!item) return;

                // selected text of drop down button list 
                const selectedText = item.querySelector('div').textContent;

                // 1.change drop down button text
                modeDropDownButton.querySelector('div').textContent = selectedText;

                // 2.change drop down button icon
                const isAgent = selectedText === 'Agent';
                modeDropDownButtonIconPaths[0].style.opacity = isAgent ? "0" : "1";
                modeDropDownButtonIconPaths[1].style.opacity = isAgent ? "1" : "0";

                // 3.check icon update
                const modeDropDownList = modeDropDownMenu.querySelectorAll('.drop-down-list')
                // reset all check icon
                modeDropDownList.forEach(li => { li.querySelector('svg:first-child').style.opacity = "0" })
                item.querySelector('svg:first-child').style.opacity = "1";

                // 4. fold drop down menu
                modeDropDownMenu.classList.remove('show')
            })

            const addDropDownContainer = document.querySelector('#addDropDownContainer')
            const addDropDownMenu = addDropDownContainer.querySelector('.drop-down-menu')
            const addDropDownButton = document.querySelector('#addDropDownButton')
            const fileInput = document.querySelector('#fileInput')
            // click add drop down button
            addDropDownButton.addEventListener('click', e => {
                addDropDownMenu.classList.toggle('show')
            })
            // upload file from computer 기능 구현
            addDropDownMenu.addEventListener('click', e => {
                const item = e.target.closest('.drop-down-list')

                if (item === uploadBtn) {
                    fileInput.click();
                }
            })

            // select file in file system
            fileInput.addEventListener('change', e => {
                const selectedFiles = e.target.files
                Array.from(selectedFiles).forEach(file => {

                    // create file button
                    const uploadedFile = document.createElement('button');
                    uploadedFile.classList = 'btn btn-sm'
                    uploadedFile.innerHTML = `<div>${file.name}</div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M7.616 20q-.672 0-1.144-.472T6 18.385V6H5V5h4v-.77h6V5h4v1h-1v12.385q0 .69-.462 1.153T16.384 20zM17 6H7v12.385q0 .269.173.442t.443.173h8.769q.23 0 .423-.192t.192-.424zM9.808 17h1V8h-1zm3.384 0h1V8h-1zM7 6v13z" />
                    </svg>`
                    addDropDownContainer.append(uploadedFile)

                    const deleteSvg = uploadedFile.querySelector('svg')
                    // delete file button
                    deleteSvg.addEventListener('click', e => {
                        uploadedFile.remove();
                    })
                })

                // 2.fold drop down button Menu
                addDropDownMenu.classList.remove('show')
            })

            const closeBtn = document.querySelectorAll('.btn-close')
            // click close button
            closeBtn.forEach(btn => {
                btn.addEventListener('click', e => {
                    const widget = e.currentTarget.closest('.overlay')
                    const widgetToggleBtn = widget.nextElementSibling
                    widget.classList.remove('visible');
                    widget.classList.add('hidden');

                    widgetToggleBtn.classList.remove('hidden');
                    widgetToggleBtn.classList.add('visible');

                })
            });

            const widgetToggleBtn = document.querySelectorAll('.widget-toggle-btn')
            // click widget toggle btn
            widgetToggleBtn.forEach(btn => {
                btn.addEventListener('click', e => {
                    const toggle = e.currentTarget.closest('.overlay')
                    const widget = toggle.previousElementSibling

                    toggle.classList.remove('visible')
                    toggle.classList.add('hidden')

                    widget.classList.remove('hidden')
                    widget.classList.add('visible')
                })
            })

            let isDragging = false;
            let offsetX = 0;
            let offsetY = 0;
            const widgetPannel = document.querySelector('.widget-pannel')
            
            // drag widget
            widgetHeader.addEventListener('mousedown', e => {
                // 닫기 버튼을 눌렀을 때는 드래그 X
                if (e.currentTarget.closest('.btn-close')) return;

                isDragging = true;

                const rect = widgetPannel.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;

                document.body.style.userSelect = 'none';
            })

            document.addEventListener('mousemove', e => {
                if (!isDragging) return;

                let newLeft = e.clientX - offsetX;
                let newTop = e.clientY - offsetY;

                // 화면 밖으로 너무 나가지 않게 제한
                const maxLeft = window.innerWidth - widgetPannel.offsetWidth;
                const maxTop = window.innerHeight - widgetPannel.offsetHeight;

                newLeft = Math.max(0, Math.min(newLeft, maxLeft));
                newTop = Math.max(0, Math.min(newTop, maxTop));

                widgetPannel.style.left = `${newLeft}px`
                widgetPannel.style.top = `${newTop}px`

            })

            document.addEventListener('mouseup', e => {
                isDragging = false;
                document.body.style.userSelect = '';
            })


        </script>
        <script src="./json_reader.js"></script>
    </div>

</body>
