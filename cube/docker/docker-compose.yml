services:
  datacube-server:
    image: datacube-server:0.2.1
    container_name: datacube-server
    ports:
      - "5003:5003"
    environment:
      DATA_ROOT: /data/datacube
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: datacube
      DB_USER: cubeuser
      DB_PASSWORD: cubepwd
      STARTUP_DELAY_SECONDS: "2"
      TZ: Asia/Seoul
    networks:
      - datacube-net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: datacube-db:0.2.1
    container_name: datacube-db
    environment:
      POSTGRES_DB: datacube
      POSTGRES_USER: cubeuser
      POSTGRES_PASSWORD: cubepwd
      TZ: Asia/Seoul
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      - datacube-net
    restart: unless-stopped

networks:
  datacube-net:
    driver: bridge
