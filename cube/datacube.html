<!DOCTYPE html>

<head>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-y: auto;
            box-sizing: border-box;
            font: 'Pretendard';
        }

        #output {
            width: 100%;
            height: 100px;
            background-color: whitesmoke;
            border-radius: 0.5rem;
            white-space: pre-line;
        }
    </style>
</head>

<body>
    <div id="cesiumContainer" style="width: 100%;"></div>
    <div id="container">
        <select id="fileType" name="fileType">
            <option value="default">파일 형식을 선택하세요</option>
            <option value="tiles">3D Tiles</option>
            <option value="las">LAS</option>
            <option value="tif">TIF</option>
            <option value="netcdf">NetCDF</option>
            <option value="cube">Cube</option>
            <option value="shp">SHP</option>
            <option value="json">JSON</option>
            <option value="csv">CSV</option>
        </select>
        <div id="dynamicOptions" style="margin-left: 10px; display: inline-block;"></div>
    </div>
    <input type="file" id="input"></input>
    <button id="load">로드</button>
    <button id="jobBtn">확인</button>
    <button id="deleteBtn">삭제</button>
    <pre id="output"></pre>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.139/Build/Cesium/Cesium.js"></script>
    <script src="./docker/datacube-javascript-client-0.2.1/datacube-sdk.js"></script>
    <script src="./docker/datacube-javascript-client-0.2.1/datacube-viewer.js"></script>
    <script type="module">
        let client = null;
        let jobId = null;

        // 초기화
        (async function () {
            client = new DataCubeClient('http://localhost:5003', {
                apiKey: `dcube_f3ec12644379098c506ca83c5d511897`
            });

            const viewer = client.createViewer('cesiumContainer', {
                terrain: 'vworld',
                imagery: 'vworld'
            });

            await viewer.ready();
            const handle = await viewer.loadTileset(`ss`);
            viewer.setOpacity(handle, 0.85);
        })();

        const cesiumCanvas = document.querySelector('canvas')
        cesiumCanvas.style.width = '100%'
        cesiumCanvas.style.height = '590px'

        // 로드 
        const load = document.getElementById('load');
        const fileType = document.getElementById('fileType')
        let type = 'default';
        const container = document.getElementById('container')
        const dynamicOptions = document.getElementById('dynamicOptions');
        var upload = null;
        var submit = null;

        // json 선택시
        fileType.addEventListener('change', () => {
            type = fileType.value
            dynamicOptions.innerHTML = '';

            if (type == 'json') {
                const levels = [
                    { value: 'sido', label: '시도' },
                    { value: 'sigungu', label: '시군구' },
                    { value: 'emd', label: '읍면동' }
                ];

                levels.forEach((item, index) => {
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = 'adminLevel';
                    radio.value = item.value;
                    radio.id = `adminLevel_${item.value}`;
                    if (index === 0) radio.checked = true;

                    const label = document.createElement('label');
                    label.htmlFor = `adminLevel_${item.value}`;
                    label.textContent = item.label;
                    label.style.marginLeft = '5px';
                    label.style.marginRight = '15px';

                    dynamicOptions.appendChild(radio);
                    dynamicOptions.appendChild(label);
                });
            }
        })

        // 로드 버튼 클릭시
        load.addEventListener('click', (async function () {
            var file = document.getElementById('input').files;
            console.log(file)
            switch (type) {
                case 'tiles':
                    upload = await client.data.uploadGlb(file);
                    submit = await client.data.createGlb('ss', upload.upload_dir)
                    jobId = submit.job_id
                    break;
                case 'las':
                    upload = await client.data.uploadLas(file);
                    submit = await client.data.createLas('ss', upload.las_file)
                    jobId = submit.job_id
                    break;
                case 'tif':
                    upload = await client.data.uploadTif(file);
                    submit = await client.data.createTif('ss', upload.tif_file, {
                        max_level: 12
                    })
                    jobId = submit.job_id
                    break;
                case 'netcdf':
                    upload = await client.data.uploadNetcdf(file);
                    submit = await client.data.createNetcdf('ss', {
                        mode: 'single',
                        data_type: 'wind',
                        u_file: upload.files[0],
                        v_file: upload.files[1],
                        max_level: 3,
                        voxel_resolution: 64,
                        value_type: 'float',
                        tile_height: 4000000,
                        subtree_levels: 3
                    })
                    jobId = submit.job_id
                    break;
                case 'cube':
                    upload = await client.data.uploadCube(file);
                    submit = await client.data.createCube(`ss`, upload.upload_dir)
                    jobId = submit.job_id
                    break;
                case 'shp':  //building은 되는데 point는 안됨!
                    upload = await client.data.uploadShp(file);
                    submit = await client.data.createShp(`ss`, upload.shp_files)
                    jobId = submit.job_id
                    break;
                case 'json':
                    const checkedRadio = document.querySelector('input[name="adminLevel"]:checked');
                    const adminLevelVal = checkedRadio ? checkedRadio.value : 'sido';
                    upload = await client.data.uploadJson(file[0]);
                    submit = await client.data.createAdmin(`ss`, upload.filepath, {
                        admin_level: adminLevelVal
                    })
                    jobId = submit.job_id
                    break;
                case 'csv':
                    upload = await client.data.uploadJson(file[0]);
                    submit = await client.data.createPoint(`ss`, upload.filepath, {
                        shp_type: 'point_type'
                    })
                    jobId = submit.job_id
                    break;
                default: console.log('파일 형식을 선택하세요')
            }


        }))

        // Job 상태 확인 
        const jobBtn = document.getElementById('jobBtn')
        const out = document.getElementById('output')
        let finalStatus = null;
        jobBtn.addEventListener('click', async () => {

            // 버튼 실행 막기
            jobBtn.disabled = true;
            out.textContent = '[로드 실행 중 •••]'

            // 20초마다 반복
            let intervalId = setInterval(async () => {

                const detail = await client.data.jobStatus(jobId);
                const logs = detail.log.split('\n') // 로그 분리
                let log = logs[logs.length - 1]

                if (log.includes('|')) {
                    log = log.replaceAll('|', '\n')
                    out.textContent = log;
                } else {
                    out.textContent = log;
                }

                if (log == "") {
                    out.textContent = '[로드 종료]'
                    clearInterval(intervalId)
                    intervalId = null
                }

            }, 10000)

            jobBtn.disabled = false;
        });

        // delete layer
        const deleteBtn = document.getElementById('deleteBtn');
        deleteBtn.addEventListener('click', async () => {
            await client.layers.delete('ss');
        })



    </script>
</body>
